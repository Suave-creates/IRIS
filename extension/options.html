<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IRIS Meeting Capture</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 18px; width: 300px; background: #fff; color: #16151a;
      }
      @media (prefers-color-scheme: dark) { body { background: #1c1b21; color: #f2f1f5; } }
      h1 { font-size: 15px; margin: 0 0 4px; }
      p { font-size: 12px; color: #77747f; margin: 0 0 14px; line-height: 1.5; }
      label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 6px; }
      input {
        width: 100%; box-sizing: border-box; padding: 9px 10px; font-size: 13px;
        border: 1px solid #d9d7e0; border-radius: 9px; background: transparent; color: inherit;
      }
      input:focus { outline: none; border-color: #762fcc; }
      button {
        margin-top: 12px; width: 100%; border: none; cursor: pointer; border-radius: 9px;
        padding: 10px; background: #762fcc; color: #fff; font-size: 13px; font-weight: 650;
      }
      button:hover { filter: brightness(1.07); }
      .saved { font-size: 12px; color: #1f9d57; margin-top: 10px; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>IRIS Meeting Capture</h1>
    <p>Where is IRIS running? The "Track in IRIS" button opens the Meetings view here.</p>
    <label for="iris-url">IRIS base URL</label>
    <input id="iris-url" type="url" placeholder="http://localhost:5173" spellcheck="false" />
    <button id="save">Save</button>
    <div class="saved" id="saved"></div>
    <script src="options.js"></script>
  </body>
</html>
