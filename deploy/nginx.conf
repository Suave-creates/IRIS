# IRIS edge: serve the SPA and reverse-proxy the API to the Node server.
# Single origin → cookies, CORS and OAuth redirects all use one host.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Recorder uploads two audio channels (mic + call) — well above nginx's 1 MiB default.
  client_max_body_size 512M;

  # API → Node. Chat uses Server-Sent Events, so buffering must be off and the
  # read timeout long, or streamed tokens stall / the connection drops.
  location /api/ {
    proxy_pass http://server:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Bare health check for infra probes.
  location = /health {
    proxy_pass http://server:8080;
    proxy_set_header Host $host;
  }

  # Long-cache the fingerprinted assets; never cache the HTML shell.
  location /assets/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # SPA client-side routing: everything else falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
